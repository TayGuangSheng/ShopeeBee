services:
  - type: web
    name: shopeebee
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: DATABASE_URL
        value: file:/data/shopeebee.db
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SHOPEE_AFFILIATE_ID
        sync: false
      - key: SHOPEE_AFFILIATE_SUB_ID
        value: shopeebee
      - key: SHOPEE_EXPAND_SHORT_LINKS
        value: true
      - key: SHOPEE_CONVERSION_TIMEOUT_MS
        value: 90000
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 10
      - key: QUEUE_CONCURRENCY
        value: 1
      - key: MAX_LINKS_PER_MESSAGE
        value: 5
